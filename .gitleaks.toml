# gitleaks configuration — Enclave
# Born-clean secret hygiene. Extends the built-in gitleaks ruleset and adds
# stack-specific rules for the cloud keys and tokens that live only in .env.
#
# Usage:
#   gitleaks detect --config .gitleaks.toml                 # scan git history
#   gitleaks detect --config .gitleaks.toml --no-git        # scan working tree
#   docker run --rm -v "$PWD":/repo -w /repo \
#     ghcr.io/gitleaks/gitleaks:latest detect --config .gitleaks.toml
#
# Run before the FIRST commit of the stack, and enforced via .pre-commit-config.yaml.

title = "Enclave gitleaks config"

[extend]
# Inherit gitleaks' maintained default ruleset (AWS, GCP, Slack, generic API keys,
# private keys, JWTs, etc.). Our custom rules below are additive.
useDefault = true

# ── Stack-specific rules (providers we actually carry keys for) ─────────────
[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''(?i)\b\d{8,10}:[A-Za-z0-9_-]{35}\b'''
keywords = ["telegram", "bot"]

[[rules]]
id = "openrouter-key"
description = "OpenRouter API key"
regex = '''\bsk-or-v1-[0-9a-f]{48,}\b'''
keywords = ["sk-or-v1"]

[[rules]]
id = "deepseek-key"
description = "DeepSeek API key"
regex = '''\bsk-[0-9a-f]{32}\b'''
keywords = ["deepseek", "sk-"]

[[rules]]
id = "cloudflare-global-api-key"
description = "Cloudflare Global API key (37 hex chars)"
regex = '''(?i)\b[0-9a-f]{37}\b'''
keywords = ["cloudflare", "dns", "zone"]

[[rules]]
id = "generic-env-assignment-secret"
description = "High-entropy value assigned to a *_KEY / *_TOKEN / *_SECRET / *_PASSWORD var"
regex = '''(?i)\b([A-Z0-9_]*(KEY|TOKEN|SECRET|PASSWORD|PASS)[A-Z0-9_]*)\s*[:=]\s*['"]?([A-Za-z0-9+/_\-]{20,})['"]?'''
secretGroup = 3
keywords = ["key", "token", "secret", "password", "pass"]

# ── Allowlist: placeholders, examples, and templates are NOT secrets ─────────
[allowlist]
description = "Ignore documented placeholders and example/template env files"
# Never scan the example/template scaffolds — they carry placeholders by design.
paths = [
  '''\.env\.example$''',
  '''\.env\.template$''',
  '''(^|/)README\.md$''',
  '''(^|/)memory/''',
  '''(^|/)pm/''',
]
# Common placeholder tokens used throughout the stack.
regexes = [
  '''<CHANGE_ME[^>]*>''',
  '''<PASTE[^>]*>''',
  '''<auto-generated>''',
  '''your[-_]?(api[-_]?)?key[-_]?here''',
  '''(?i)changeme''',
  '''sk-xxx+''',
  '''admin_password:/run/secrets/portainer_admin_password''',
]
# Do NOT allow-stop the whole match; only true placeholder lines above.
regexTarget = "match"
