name: Add to Global Engineering Hub
on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]
jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/alwazw/projects/8
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}