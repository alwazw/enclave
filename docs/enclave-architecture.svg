<svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1060" height="720" fill="#0b0f1a"/>
  <rect x="0" y="0" width="1060" height="6" fill="#22d3ee" opacity="0.9"/>

  <!-- header -->
  <text x="44" y="62" fill="#e5e9f0" font-size="38" font-weight="700" letter-spacing="1">ENCLAVE</text>
  <text x="243" y="62" fill="#22d3ee" font-size="17" font-weight="600">governed · sovereign · accountable autonomous agents</text>
  <text x="44" y="90" fill="#94a3b8" font-size="14.5">You talk to one agent. It incorporates projects, spawns a governed CEO for each, and nothing ships without proof.</text>

  <!-- YOU pill -->
  <rect x="44" y="112" width="120" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
  <text x="104" y="137" fill="#e5e9f0" font-size="15" font-weight="600" text-anchor="middle">You</text>
  <path d="M164 132 H208" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Plane 1: GATEWAY -->
  <rect x="220" y="108" width="796" height="92" rx="12" fill="#131a2b" stroke="#2a3956"/>
  <rect x="220" y="108" width="150" height="92" rx="12" fill="#182238"/>
  <text x="238" y="140" fill="#6366f1" font-size="13" font-weight="700" letter-spacing="1.5">GATEWAY</text>
  <text x="238" y="162" fill="#e5e9f0" font-size="17" font-weight="700">Hermes</text>
  <text x="238" y="182" fill="#94a3b8" font-size="12.5">board / co-director</text>
  <text x="392" y="146" fill="#cbd5e1" font-size="14.5">Turns your intent into action: incorporate a project · spawn its CEO ·</text>
  <text x="392" y="168" fill="#cbd5e1" font-size="14.5">route work · read-only rollup of every project's board.</text>

  <!-- flow arrow down -->
  <path d="M300 200 V232" stroke="#3b4a66" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="9" markerHeight="9" refX="4.5" refY="8" orient="auto">
      <path d="M0 0 L9 0 L4.5 9 z" fill="#3b4a66"/>
    </marker>
  </defs>

  <!-- Plane 2: RUNTIME -->
  <rect x="220" y="236" width="796" height="150" rx="12" fill="#131a2b" stroke="#2a3956"/>
  <rect x="220" y="236" width="150" height="150" rx="12" fill="#182238"/>
  <text x="238" y="268" fill="#6366f1" font-size="13" font-weight="700" letter-spacing="1.5">RUNTIME</text>
  <text x="238" y="290" fill="#e5e9f0" font-size="17" font-weight="700">Project CEO</text>
  <text x="238" y="310" fill="#94a3b8" font-size="12.5">+ dept heads</text>
  <text x="238" y="332" fill="#94a3b8" font-size="12.5">(LangGraph)</text>

  <!-- runtime inner flow: work -> GATE -> done -->
  <rect x="392" y="262" width="150" height="48" rx="9" fill="#1b2740" stroke="#33456b"/>
  <text x="467" y="284" fill="#e5e9f0" font-size="14" font-weight="600" text-anchor="middle">agents do</text>
  <text x="467" y="301" fill="#94a3b8" font-size="12.5" text-anchor="middle">the work</text>

  <!-- arrow to gate -->
  <path d="M542 286 H584" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- THE EVIDENCE GATE (the differentiator) -->
  <rect x="586" y="250" width="196" height="72" rx="11" fill="url(#gate)"/>
  <text x="684" y="278" fill="#062430" font-size="15.5" font-weight="800" text-anchor="middle">EVIDENCE GATE</text>
  <text x="684" y="300" fill="#062430" font-size="12" font-weight="600" text-anchor="middle">no "done" without proof</text>

  <!-- arrow gate -> done -->
  <path d="M782 286 H826" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="828" y="262" width="150" height="48" rx="9" fill="#0f2e22" stroke="#1f7a52"/>
  <text x="903" y="291" fill="#4ade80" font-size="15" font-weight="700" text-anchor="middle">✓ DONE</text>

  <!-- proof required row -->
  <text x="392" y="344" fill="#94a3b8" font-size="13">Proof required to pass the gate:</text>
  <text x="392" y="366" fill="#cbd5e1" font-size="13.5">passing tests  +  a real screenshot of what the user actually sees</text>

  <!-- model line -->
  <text x="700" y="366" fill="#94a3b8" font-size="12.5" text-anchor="end">models via LiteLLM → Ollama (GPU-optional) · cloud fallback</text>

  <!-- enforces line from constitution to gate -->
  <path d="M684 322 V398" stroke="#22d3ee" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="694" y="360" fill="#22d3ee" font-size="11.5" font-style="italic"></text>

  <!-- Plane 3: CONSTITUTION -->
  <rect x="220" y="402" width="796" height="118" rx="12" fill="#131a2b" stroke="#2a3956"/>
  <rect x="220" y="402" width="150" height="118" rx="12" fill="#182238"/>
  <text x="238" y="434" fill="#6366f1" font-size="13" font-weight="700" letter-spacing="1.5">CONSTITUTION</text>
  <text x="238" y="456" fill="#e5e9f0" font-size="17" font-weight="700">The Registrar</text>
  <text x="238" y="476" fill="#94a3b8" font-size="12.5">model-agnostic</text>
  <text x="238" y="498" fill="#94a3b8" font-size="12.5">service — enforces</text>

  <text x="392" y="438" fill="#cbd5e1" font-size="14">• Evidence gate — a task cannot close without recorded proof (enforced, not logged)</text>
  <text x="392" y="462" fill="#cbd5e1" font-size="14">• Jurisdiction — every agent bounded to one project; cannot reach across</text>
  <text x="392" y="486" fill="#cbd5e1" font-size="14">• Git-versioned memory — every board change is an auditable commit</text>
  <text x="392" y="510" fill="#cbd5e1" font-size="14">• UX gate — a real Playwright screenshot before any user-facing task closes</text>

  <!-- enforces label near dashed line -->
  <rect x="640" y="386" width="90" height="20" rx="10" fill="#0b0f1a"/>
  <text x="685" y="400" fill="#22d3ee" font-size="11.5" font-weight="600" text-anchor="middle">enforces ↑</text>

  <!-- Sovereignty strip -->
  <rect x="44" y="556" width="972" height="60" rx="12" fill="#0e1626" stroke="#22d3ee" stroke-opacity="0.35"/>
  <text x="530" y="582" fill="#e5e9f0" font-size="16" font-weight="700" text-anchor="middle">100% local  ·  air-gappable  ·  no per-token cloud  ·  runs with no GPU</text>
  <text x="530" y="603" fill="#94a3b8" font-size="13" text-anchor="middle">The difference between "an AI did some work" and "an AI did the work, proved it, and left an audit trail."</text>

  <!-- footnote -->
  <text x="44" y="648" fill="#64748b" font-size="12.5">Deploys single-node (Docker Compose) → optional 3-node Swarm upgrade (inference / orchestration+data / worker planes)</text>
  <text x="1016" y="648" fill="#64748b" font-size="12.5" text-anchor="end">MIT · self-hosted</text>
</svg>
