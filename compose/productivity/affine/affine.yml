services:
  affine-migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine_migration
    restart: no
    profiles: [knowledge]
    # Labeled so onboard.sh's post-bring-up cleanup can prune it once it exits
    # 0 — a one-shot migration job showing "Exited" in Homepage/Portainer reads
    # as "down" to anyone glancing at the dashboard, even though exit 0 means
    # success. Safe to remove: `depends_on: service_completed_successfully`
    # only gates the FIRST bring-up; a later `docker compose up` recreates and
    # reruns this (idempotent migration script) before starting affine again.
    labels:
      aef2.oneshot: "true"
    command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_AFFINE:-affine}"
      AFFINE_SERVER_EXTERNAL_URL: "http://localhost:${AFFINE_PORT:-3010}"
      REDIS_SERVER_HOST: ${REDIS_HOST:-redis}
      REDIS_SERVER_PORT: ${REDIS_PORT:-6379}
      REDIS_SERVER_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend-net, database-net]

  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine
    restart: unless-stopped
    profiles: [knowledge]
    ports:
      - "${AFFINE_PORT:-3010}:3010"
    volumes:
      - affine_data:/root/.affine
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_AFFINE:-affine}"
      AFFINE_SERVER_EXTERNAL_URL: "http://localhost:${AFFINE_PORT:-3010}"
      AFFINE_ADMIN_EMAIL: ${AFFINE_ADMIN_EMAIL}
      AFFINE_ADMIN_PASSWORD: ${AFFINE_ADMIN_PASSWORD}
      REDIS_SERVER_HOST: ${REDIS_HOST:-redis}
      REDIS_SERVER_PORT: ${REDIS_PORT:-6379}
      REDIS_SERVER_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      MAILER_SENDER: ""
      MAILER_HOST: ""
    depends_on:
      affine-migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      homepage.group: Knowledge
      homepage.name: AFFiNE
      homepage.icon: https://affine.pro/favicon.ico
      homepage.href: "http://localhost:${AFFINE_PORT:-3010}"
      homepage.description: Notion + Miro replacement — docs, whiteboards, databases, offline-first
    networks: [frontend-net, backend-net, database-net]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3010',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  affine_data:
    external: true

networks:
  frontend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_frontend
  backend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_backend
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
