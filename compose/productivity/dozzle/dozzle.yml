services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    profiles: [observability]
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle_data:/data
      # Generated by scripts/init-dozzle-auth.sh — bcrypt-hashed credential, never
      # the plaintext password. File is gitignored (see .gitignore secrets section).
      - ../../../config/dozzle/users.yml:/data/users.yml:ro
    environment:
      DOZZLE_LEVEL: info
      # Security hardening (2026-07-13): zero-auth + docker.sock made the "Inspect"
      # panel an unauthenticated full-env-var dump over the LAN (3 execs independently
      # flagged this — CTO/Security/Engineering). Now file-based auth, actions disabled.
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_ENABLE_ACTIONS: "false"
    labels:
      homepage.group: Observability
      homepage.name: Dozzle
      homepage.icon: https://dozzle.dev/favicon.ico
      homepage.href: "http://localhost:${DOZZLE_PORT:-9999}"
      homepage.description: Real-time Docker log streaming — all container logs in one searchable UI
    networks: [frontend-net]
    healthcheck:
      # Dozzle's image is distroless (no shell, no wget/curl — confirmed via
      # `docker run --entrypoint sh` failing with "executable file not found").
      # Dozzle ships its own `dozzle healthcheck` subcommand for exactly this.
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  dozzle_data:
    external: true

networks:
  frontend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_frontend
