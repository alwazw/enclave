services:
  open-interpreter:
    # openinterpreter/open-interpreter:latest does not exist on Docker Hub — no
    # official image was ever published, and that bad reference was aborting
    # `docker compose pull` for the ENTIRE stack (compose stops the whole pull
    # batch on the first per-image failure). Built from the real PyPI package
    # instead — see ../../../open-interpreter/Dockerfile for the full rationale
    # (upstream GitHub repo has since been repurposed into an unrelated project;
    # PyPI 0.4.3 is the last real release and the source of truth here).
    build: ../../../open-interpreter
    image: enclave/open-interpreter:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_open_interpreter
    restart: unless-stopped
    profiles: [memory]
    ports:
      - "${OI_PORT:-8143}:8143"
    volumes:
      - oi_workspace:/workspace
    environment:
      OPENAI_BASE_URL: "http://litellm:${LITELLM_PORT:-4000}/v1"
      OPENAI_API_KEY: ${LITELLM_API_KEY}
      INTERPRETER_DEFAULT_MODEL: ${OI_MODEL:-qwen2.5-coder:32b}
      INTERPRETER_SAFE_MODE: "off"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8143"
    labels:
      homepage.group: AI Agents
      homepage.name: Open Interpreter
      homepage.icon: https://openinterpreter.com/favicon.ico
      homepage.href: "http://localhost:${OI_PORT:-8143}"
      homepage.description: Sandboxed code execution — Hermes delegates all code tasks here
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8143/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  oi_workspace:
    external: true

networks:
  backend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_backend
