services:
  langfuse:
    image: langfuse/langfuse:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_langfuse
    restart: unless-stopped
    profiles: [observability]
    ports:
      - "${LANGFUSE_PORT:-3300}:3000"
    volumes:
      - langfuse_data:/app/.langfuse
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_LANGFUSE:-langfuse}"
      NEXTAUTH_URL: "http://localhost:${LANGFUSE_PORT:-3300}"
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET_KEY}
      SALT: ${LANGFUSE_ENCRYPTION_KEY}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      homepage.group: Observability
      homepage.name: Langfuse
      homepage.icon: https://langfuse.com/favicon.ico
      homepage.href: "http://localhost:${LANGFUSE_PORT:-3300}"
      homepage.description: LLM tracing + cost analytics — every Hermes/n8n/Flowise call tracked
    networks: [frontend-net, database-net]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  langfuse_data:
    external: true

networks:
  frontend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_frontend
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
