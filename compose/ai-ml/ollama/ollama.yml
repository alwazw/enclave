services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_ollama
    restart: unless-stopped
    profiles: [core]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_ORIGINS: "*"
      OLLAMA_KEEP_ALIVE: 24h
      # GPU is OPTIONAL (bonus tier — see README): the default boot is CPU-only so a
      # no-GPU clone works out of the box. To enable NVIDIA acceleration, ALSO pass
      # the override:  -f compose/ai-ml/ollama/ollama.gpu.yml
    labels:
      homepage.group: AI Infrastructure
      homepage.name: Ollama
      homepage.icon: ollama.png
      homepage.href: http://localhost:${OLLAMA_PORT:-11434}
      homepage.description: Local model server — all LLM inference routes through LiteLLM→Ollama
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'my $$s=IO::Socket::INET->new(PeerHost=>\"localhost\",PeerPort=>11434,Proto=>\"tcp\") or exit 1; print $$s \"GET /api/tags HTTP/1.0\r\nHost: localhost\r\n\r\n\"; while(<$$s>){exit 0 if /200 OK/} exit 1'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
    external: true

networks:
  backend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_backend
