services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_ollama
    restart: unless-stopped
    profiles: [core]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_ORIGINS: "*"
      # Configurable, NOT hardcoded — setup.sh computes OLLAMA_NUM_THREADS/NUM_PARALLEL from
      # the host's actual CPU count at bootstrap and writes them into .env (see setup.sh's
      # configure_ollama_resources()). The fallbacks below only apply if .env is missing them
      # entirely (e.g. hand-edited compose usage) and are deliberately conservative so a
      # local inference run never assumes it owns the whole box — the rest of the mesh
      # (Postgres, Redis, n8n, LiteLLM, ...) needs headroom too.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_NUM_THREADS: ${OLLAMA_NUM_THREADS:-2}
      # GPU is OPTIONAL (bonus tier — see README): the default boot is CPU-only so a
      # no-GPU clone works out of the box. To enable NVIDIA acceleration, ALSO pass
      # the override:  -f compose/ai-ml/ollama/ollama.gpu.yml (setup.sh does this
      # automatically when it detects a working NVIDIA GPU).
    labels:
      homepage.group: AI Infrastructure
      homepage.name: Ollama
      homepage.icon: ollama.png
      homepage.href: http://localhost:${OLLAMA_PORT:-11434}
      homepage.description: Local model server — all LLM inference routes through LiteLLM→Ollama
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'my $$s=IO::Socket::INET->new(PeerHost=>\"localhost\",PeerPort=>11434,Proto=>\"tcp\") or exit 1; print $$s \"GET /api/tags HTTP/1.0\r\nHost: localhost\r\n\r\n\"; while(<$$s>){exit 0 if /200 OK/} exit 1'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
    external: true

networks:
  backend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_backend
