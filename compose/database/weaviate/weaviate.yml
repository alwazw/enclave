services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:latest
    container_name: weaviate
    restart: unless-stopped
    profiles: [extras]
    ports:
      - "${WEAVIATE_HTTP_PORT:-8280}:8080"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_API_BASED_MODULES: "true"
      # Auto-vectorize via Ollama (no cloud API needed)
      ENABLE_MODULES: text2vec-ollama,generative-ollama
      TEXT2VEC_OLLAMA_API_ENDPOINT: http://ollama:11434
      GENERATIVE_OLLAMA_API_ENDPOINT: http://ollama:11434
      CLUSTER_HOSTNAME: node1
      TELEMETRY_DISABLED: "true"
    labels:
      homepage.group: Vector Databases
      homepage.name: Weaviate
      homepage.icon: https://weaviate.io/favicon.ico
      homepage.href: http://localhost:${WEAVIATE_HTTP_PORT:-8280}
      homepage.description: Hybrid vector+keyword search with Ollama auto-vectorization
    networks:
      - database-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  weaviate_data:
    external: true

networks:
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
  backend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_backend
