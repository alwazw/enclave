services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_redis
    restart: unless-stopped
    profiles: [core]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    labels:
      homepage.group: Databases
      homepage.name: Redis
      homepage.icon: redis.png
      homepage.description: Cache + queues — n8n · Open WebUI sessions
    networks:
      - database-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    external: true

networks:
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
