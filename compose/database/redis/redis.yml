services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_redis
    restart: unless-stopped
    profiles: [core]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    # noeviction, not allkeys-lru: this Redis backs n8n's BullMQ job queue and
    # AFFiNE's session store, not a pure cache. BullMQ explicitly requires
    # noeviction — under allkeys-lru, Redis can silently evict a job waiting
    # to be processed (or an active session) once maxmemory is hit, instead of
    # rejecting the write with a visible error. AFFiNE's own startup logs were
    # already warning "Eviction policy is allkeys-lru. It should be
    # 'noeviction'" on every boot — this was a real, previously-unactioned bug.
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 1gb
      --maxmemory-policy noeviction
    labels:
      homepage.group: Databases
      homepage.name: Redis
      homepage.icon: redis.png
      homepage.description: Cache + queues — n8n · Open WebUI sessions
    networks:
      - database-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    external: true

networks:
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
