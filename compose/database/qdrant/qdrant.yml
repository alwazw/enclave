services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [core]
    ports:
      - "${QDRANT_PORT_HTTP:-6333}:6333"
      - "${QDRANT_PORT_GRPC:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "false"
      QDRANT__TELEMETRY_DISABLED: "true"
    labels:
      homepage.group: Vector Databases
      homepage.name: Qdrant
      homepage.icon: https://qdrant.tech/favicon.ico
      homepage.href: http://localhost:${QDRANT_PORT_HTTP:-6333}/dashboard
      homepage.description: Primary vector store — Hermes memory · Mem0 · AnythingLLM · RAG
    networks:
      - database-net
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'my $$s=IO::Socket::INET->new(PeerHost=>\"localhost\",PeerPort=>6333,Proto=>\"tcp\") or exit 1; print $$s \"GET /readyz HTTP/1.0\r\nHost: localhost\r\n\r\n\"; while(<$$s>){exit 0 if /200 OK/} exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_data:
    external: true

networks:
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
  backend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_backend
