services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_portainer
    restart: unless-stopped
    profiles: [tools]
    ports:
      - "${PORTAINER_HTTP_PORT:-9000}:9000"
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
      # Generated by scripts/init-portainer-auth.sh — plaintext file, Portainer
      # hashes it internally on first boot only. Gitignored, 600 perms.
      - ../../../config/portainer/admin_password:/run/secrets/portainer_admin_password:ro
    # Security hardening (2026-07-13): pre-seeds the admin account so the LAN-wide
    # ~5min "first visitor claims it" race window never exists. Only takes effect
    # before an admin account has been created (i.e. on a fresh portainer_data volume).
    command: ["--admin-password-file=/run/secrets/portainer_admin_password"]
    labels:
      homepage.group: Dev Tools
      homepage.name: Portainer
      homepage.icon: portainer.png
      homepage.href: "http://localhost:${PORTAINER_HTTP_PORT:-9000}"
      homepage.description: Docker container management — deploy, inspect, live logs, shell access
    networks: [frontend-net]
    # No Docker healthcheck: portainer-ce's image is fully distroless (no shell, no
    # wget/curl, no built-in healthcheck subcommand) — any CMD-based check fails with
    # "executable file not found" regardless of the command chosen, so it can never
    # report anything but permanently unhealthy. Verified working via external HTTP
    # check (curl from another container on frontend-net) instead.

volumes:
  portainer_data:
    external: true

networks:
  frontend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_frontend
