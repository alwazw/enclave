services:
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef2}_cloudbeaver
    restart: unless-stopped
    profiles: [tools]
    ports:
      - "${CLOUDBEAVER_PORT:-8978}:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    environment:
      CB_SERVER_NAME: "AEF2 CloudBeaver"
      CB_SERVER_URL: "http://localhost:${CLOUDBEAVER_PORT:-8978}"
      CB_ADMIN_NAME: ${CLOUDBEAVER_ADMIN_USER:-admin}
      CB_ADMIN_PASSWORD: ${CLOUDBEAVER_ADMIN_PASSWORD}
    labels:
      homepage.group: Dev Tools
      homepage.name: CloudBeaver
      homepage.icon: https://dbeaver.io/img/cloudbeaver-logo.png
      homepage.href: "http://localhost:${CLOUDBEAVER_PORT:-8978}"
      homepage.description: Browser-based DB manager — Postgres, SurrealDB, Redis in one UI
    networks: [frontend-net, database-net]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8978/status"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  cloudbeaver_data:
    external: true

networks:
  frontend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_frontend
  database-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aef2}_database
